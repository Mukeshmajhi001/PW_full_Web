<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extended Form</title>
</head>

<body>
    <h1>Registration Form</h1>
    <form>
        <fieldset>
            <legend>Welcome to My World</legend>

            <label for="username">Username:</label>
            <input type="text" id="username" required>
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" required>
            <br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" required>
            <br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" required>
            <br><br>

            <label for="age">Age:</label>
            <input type="number" id="age" min="1" max="100">
            <br><br>

            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>
            <br><br>

            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="nepal">Nepal</option>
                <option value="india">India</option>
                <option value="usa">USA</option>
                <option value="uk">UK</option>
                <option value="other">Other</option>
            </select>
            <br><br>

            <label>Hobbies:</label><br>
            <input type="checkbox" id="reading" name="hobby" value="reading">
            <label for="reading">Reading</label><br>
            <input type="checkbox" id="sports" name="hobby" value="sports">
            <label for="sports">Sports</label><br>
            <input type="checkbox" id="music" name="hobby" value="music">
            <label for="music">Music</label><br>
            <input type="checkbox" id="travel" name="hobby" value="travel">
            <label for="travel">Travel</label><br><br>

            <label for="feedback">Feedback:</label><br>
            <textarea id="feedback" rows="4" cols="40" placeholder="Write your feedback here..."></textarea>
            <br><br>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </fieldset>
    </form>
</body>

</html>
