<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Toppings</title>
</head>

<body>
    <fieldset>
        <legend>Extra*</legend>

        <input type="checkbox" id="mushroom" name="topping" value="mushroom">
        <label for="mushroom">Mushroom</label><br>

        <input type="checkbox" id="greenpeppers" name="topping" value="greenpeppers">
        <label for="greenpeppers">Green peppers</label><br>

        <input type="checkbox" id="anchovies" name="topping" value="anchovies">
        <label for="anchovies">Anchovies</label><br>

        <input type="checkbox" id="cheese" name="topping" value="cheese">
        <label for="cheese">Extra cheese</label><br>
    </fieldset>
</body>

</html>
