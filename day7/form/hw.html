<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HW</title>

    <style>
        .top_f input {
            width: 100%;
            
        }

        .btn,
        .main_header {
            text-align: center;
        }



        fieldset {
            margin-bottom: 15px;
            min-height: 100px;
            padding: 10px;
        }

        textarea {
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="main_header">
        <h1>Pete's Pizza Delivery</h1>
        <h2>Online Order Form</h2>
        <p>* Required fields</p>
    </div>

    <form action="#" method="post">

        <fieldset>
            <legend>Customer Details</legend>

            <table width="40%">
                <tr>
                    <td style="width:90px;">
                        <label for="name">* Name</label>
                    </td>
                    <td class="top_f">
                        <input type="text" id="name" name="name" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="address">* Address</label>
                    </td>
                    <td class="top_f">
                        <input type="text" id="address" name="address" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="city">* Town/City</label>
                    </td>
                    <td class="top_f">
                        <input type="text" id="city" name="city" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="postcode">* Postcode</label>
                    </td>
                    <td class="top_f">
                        <input type="text" id="postcode" name="postcode" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="tel">* Tel</label>
                    </td>
                    <td class="top_f">
                        <input type="tel" id="tel" name="tel" required>
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="email">* Email</label>
                    </td>
                    <td class="top_f">
                        <input type="email" id="email" name="email" required>
                    </td>
                </tr>
            </table>

        </fieldset>

        <table width="100%">
            <tr>

                <td>
                    <fieldset>
                        <legend>Topping *</legend>

                        <input type="radio" id="margherita" name="topping" value="Margherita" required>
                        <label for="margherita">Margherita</label><br>

                        <input type="radio" id="fourseasons" name="topping" value="Four Seasons">
                        <label for="fourseasons">Four Seasons</label><br>

                        <input type="radio" id="meatfeast" name="topping" value="Meat Feast">
                        <label for="meatfeast">Meat Feast</label><br>

                    </fieldset>
                </td>

                <td>
                    <fieldset>
                        <legend>Size *</legend>

                        <input type="radio" id="small" name="size" value="Small" required>
                        <label for="small">Small</label><br>

                        <input type="radio" id="medium" name="size" value="Medium">
                        <label for="medium">Medium</label><br>

                        <input type="radio" id="large" name="size" value="Large">
                        <label for="large">Large</label><br>

                    </fieldset>
                </td>

                <td>
                    <fieldset>
                        <legend>Extras</legend>

                        <input type="checkbox" id="mushroom" name="extras[]" value="Mushroom">
                        <label for="mushroom">Mushroom</label><br>

                        <input type="checkbox" id="greenpeppers" name="extras[]" value="Green Peppers">
                        <label for="greenpeppers">Green Peppers</label><br>

                        <input type="checkbox" id="anchovies" name="extras[]" value="Anchovies">
                        <label for="anchovies">Anchovies</label><br>

                        <input type="checkbox" id="cheese" name="extras[]" value="Extra Cheese">
                        <label for="cheese">Extra Cheese</label><br>

                    </fieldset>
                </td>

            </tr>
        </table>

        <fieldset>
            <legend>Delivery</legend>

            <label for="time">Preferred Delivery Time</label>
            <input type="time" id="time" name="time">

            <br><br>

            <label for="instruction">Delivery Instructions</label><br>

            <textarea id="instruction" name="instruction" rows="5"></textarea>

        </fieldset>

        <div class="btn">
            <button type="submit">Submit Order</button>
        </div>

    </form>

</body>

</html>
