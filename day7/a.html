<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Table with Inputs</title>
</head>
<body>
    <table border="1">
        <!-- First row: headings -->
        <tr>
            <td width="50">SN</td>
            <td width="200">Name</td>
        </tr>

        <!-- Second row: input fields -->
        <tr>
            <td><input type="text" style="width:40px"></td>
            <td><input type="text" style="width:200px"></td>
        </tr>
    </table>
</body>
</html>
