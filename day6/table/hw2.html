<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        th {

            font-weight: bold;

        }
    </style>
</head>

<body>
    <div class="table">
        <table border="1" width="60%">
            <tr>
                <th colspan="6">Time Table</th>
            </tr>
            <tr>
                <td rowspan="6">hours</td>
                <th>mon</th>
                <th>tues</th>
                <th>wed</th>
                <th>thurs</th>
                <th>fri</th>
            </tr>
            <tr>
                <td>science</td>
                <td>math</td>
                <td>science</td>
                <td>math</td>
                <td>arts</td>
            </tr>
            <tr>
                <td>science</td>
                <td>math</td>
                <td>science</td>
                <td>math</td>
                <td>arts</td>
            </tr>
            <tr>
                <th colspan="5">Lunch</th>
            </tr>
            <tr>
                <td>science</td>
                <td>math</td>
                <td>science</td>
                <td>math</td>
                <td rowspan="2">project</td>
            </tr>
            <tr>
                <td>science</td>
                <td>math</td>
                <td>science</td>
                <td>math</td>
            </tr>
        </table>
    </div>
</body>

</html>
